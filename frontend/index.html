<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/images/fevicon.png" />
    <link rel="apple-touch-icon" href="/src/assets/images/fevicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Wisora — Sacred Wisdom, Daily. Chapter-by-chapter summaries of sacred texts. First chapter free, ₹1 per chapter for lifetime access."
    />

    <!-- Fonts: Fraunces (serif headings) + Inter (body & UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Wisora — Sacred Wisdom, Daily</title>

    <!-- Apply saved theme before paint to avoid a flash of the wrong mode. -->
    <script>
      try {
        if (localStorage.getItem('wisora.theme') === 'dark') {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
